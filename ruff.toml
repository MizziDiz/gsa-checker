# Ruff config для ядра gsa-checker (CLI + lib + утилиты + тесты).
# dashboard.py / site / deploy-скрипты — отдельное приложение оператора (Cloudflare Pages),
# вне зоны этого линта.
target-version = "py311"
line-length = 100

extend-exclude = [
  "dashboard.py",
  "autodeploy.py",
  "deploy_pages.py",
  "site",
  "data",
]

# Набор правил задаём ЯВНО (а не через дефолт ruff): CI ставит `pip install ruff`
# без пина, и свежие версии расширяют дефолт (RUF/UP/I/EXE — в т.ч. RUF001/002/003
# на кириллицу, похожую на латиницу) → падал линт. Фиксируем ровно исторический дефолт —
# Pyflakes (F) + смысловое подмножество pycodestyle (E4/E7/E9): ловит реальные баги
# (неопределённые имена, неиспользуемые импорты/переменные), не душит стилем.
[lint]
select = ["E4", "E7", "E9", "F"]
