name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Build (compile)
        run: python -m compileall -q gsa_checker.py lib check_email_providers.py select_projects.py
      - name: Tests (pytest)
        run: pytest -q
